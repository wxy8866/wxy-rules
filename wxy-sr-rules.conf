# >> 自动测速
♻️ 自动选择 = url-test, url = http://www.gstatic.com/generate_204, interval = 600, tolerance = 50, policy-regex-filter = .

# >> 服务策略
📢 谷歌FCM = select, DIRECT, ♻️ 自动选择, PROXY
Ⓜ️ 微软服务 = select, DIRECT, ♻️ 自动选择, PROXY
🍎 苹果服务 = select, DIRECT, ♻️ 自动选择, PROXY
🎮 游戏平台 = select, DIRECT, ♻️ 自动选择, PROXY


# > 地域分组
